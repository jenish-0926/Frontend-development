<!DOCTYPE html>
<html>
<head>
    <title>Simple Form Validation</title>
    <style>
        body {
            background: #f2f2f2;
            text-align: center;
        }
        .container {
            background: white;
            padding: 15px;
            width: 300px;
            margin: 50px auto; /* centers horizontally */
        }
        input, button {
            width: 99%;
            padding: 5px;
            margin: 5px auto ;
        }
        button {
            background: green;
            color: white;
        
        }
    </style>
    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let phone = document.getElementById("phone").value;

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            let phonePattern = /^[0-9]{10}$/;

            if (name === "") { alert("Name cannot be empty"); return false; }
            if (!email.match(emailPattern)) { alert("Enter valid Email"); return false; }
            if (password.length < 6) { alert("Password must be at least 6 characters"); return false; }
            if (!phone.match(phonePattern)) { alert("Enter valid 10-digit phone number"); return false; }

            alert("Form Submitted Successfully");
            return true;
        }
    </script>
</head>
<body>
    <div class="container">
        <h2 >Registration Form</h2>
        <form onsubmit="return validateForm()">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="phone" placeholder="Phone Number">
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
